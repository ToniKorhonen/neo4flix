version: '3.9'

services:
  # Neo4j Database
  neo4j:
    image: neo4j:5.15
    container_name: neo4j-db
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4jpassword", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neo4flix-network

  # PostgreSQL Database (for session management, transactions)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: neo4flix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neo4flix-network

  # Film Service (Microservice)
  film-service:
    build:
      context: ./backend
      dockerfile: film-service/Dockerfile
    container_name: film-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH_USERNAME: neo4j
      NEO4J_AUTH_PASSWORD: neo4jpassword
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neo4flix
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespassword
    ports:
      - "8001:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - neo4flix-network

  # User Service (Microservice)
  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH_USERNAME: neo4j
      NEO4J_AUTH_PASSWORD: neo4jpassword
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neo4flix
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespassword
    ports:
      - "8002:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - neo4flix-network

  # Rating Service (Microservice)
  rating-service:
    build:
      context: ./backend
      dockerfile: rating-service/Dockerfile
    container_name: rating-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH_USERNAME: neo4j
      NEO4J_AUTH_PASSWORD: neo4jpassword
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neo4flix
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespassword
    ports:
      - "8003:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - neo4flix-network

  # Recommendation Service (Microservice)
  recommendation-service:
    build:
      context: ./backend
      dockerfile: recommendation-service/Dockerfile
    container_name: recommendation-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH_USERNAME: neo4j
      NEO4J_AUTH_PASSWORD: neo4jpassword
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neo4flix
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespassword
    ports:
      - "8004:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - neo4flix-network

  # API Gateway (Spring Cloud Gateway)
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      - film-service
      - user-service
      - rating-service
      - recommendation-service
    networks:
      - neo4flix-network

  # Frontend (Angular)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neo4flix-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/certs:/etc/nginx/certs:ro
    depends_on:
      - api-gateway
    networks:
      - neo4flix-network

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:

networks:
  neo4flix-network:
    driver: bridge

