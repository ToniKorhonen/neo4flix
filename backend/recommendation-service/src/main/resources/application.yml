spring:
  application:
    name: recommendation-service
  
  profiles:
    active: local
  
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4jpassword
  
  datasource:
    url: jdbc:postgresql://localhost:5432/neo4flix
    username: postgres
    password: postgrespassword
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
  
  cache:
    type: redis
    redis:
      time-to-live: 600000

server:
  port: 8004
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.neo4flix: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

