spring:
  application:
    name: auth-service
  
  profiles:
    active: local
  
  datasource:
    url: jdbc:postgresql://localhost:5432/neo4flix
    username: postgres
    password: postgrespassword
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8005
  servlet:
    context-path: /

jwt:
  secret: aVeryLongSecureKeyForJWTThatIsAtLeast64CharactersLongForHS512AlgorithmSecurityPurpose
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

logging:
  level:
    root: INFO
    com.neo4flix: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

