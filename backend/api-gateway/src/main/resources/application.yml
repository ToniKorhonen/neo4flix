spring:
  application:
    name: api-gateway
  
  profiles:
    active: local
  
  cloud:
    gateway:
      routes:
        - id: film-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/v1/films/**
          filters:
            - StripPrefix=2
        - id: user-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2
        - id: rating-service
          uri: http://localhost:8003
          predicates:
            - Path=/api/v1/ratings/**
          filters:
            - StripPrefix=2
        - id: recommendation-service
          uri: http://localhost:8004
          predicates:
            - Path=/api/v1/recommendations/**
          filters:
            - StripPrefix=2
        - id: auth-service
          uri: http://localhost:8005
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

