<div class="auth-container">
  <div class="auth-card">
    <!-- Toggle Button -->
    <div class="auth-toggle">
      <button
        class="toggle-btn"
        [class.active]="isLogin"
        (click)="toggleAuthMode(); isLogin = true">
        Login
      </button>
      <button
        class="toggle-btn"
        [class.active]="!isLogin"
        (click)="toggleAuthMode(); isLogin = false">
        Register
      </button>
    </div>

    <!-- Messages -->
    <div class="messages">
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>
    </div>

    <!-- Login Form -->
    <form *ngIf="isLogin" [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form">
      <h2>Login</h2>

      <div class="form-group">
        <label for="emailOrUsername">Email or Username</label>
        <input
          type="text"
          id="emailOrUsername"
          formControlName="emailOrUsername"
          placeholder="Enter your email or username"
          class="form-control"
        />
        <small *ngIf="loginForm.get('emailOrUsername')?.invalid && loginForm.get('emailOrUsername')?.touched" class="error">
          Please enter your email or username
        </small>
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input
          type="password"
          id="loginPassword"
          formControlName="password"
          placeholder="Enter your password"
          class="form-control"
        />
        <small *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error">
          Password must be at least 6 characters
        </small>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="isLoading || loginForm.invalid">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <!-- Register Form -->
    <form *ngIf="!isLogin" [formGroup]="registerForm" (ngSubmit)="onRegister()" class="auth-form">
      <h2>Register</h2>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          class="form-control"
        />
        <small *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error">
          Please enter a valid email
        </small>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          formControlName="username"
          placeholder="Enter your username"
          class="form-control"
        />
        <small *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" class="error">
          Username must be between 3 and 20 characters
        </small>
      </div>

      <div class="form-group">
        <label for="registerPassword">Password</label>
        <input
          type="password"
          id="registerPassword"
          formControlName="password"
          placeholder="Enter your password"
          class="form-control"
        />
        <small *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="error">
          Password must be at least 6 characters
        </small>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="isLoading || registerForm.invalid">
        {{ isLoading ? 'Registering...' : 'Register' }}
      </button>
    </form>
  </div>
</div>
