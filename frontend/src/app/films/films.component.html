<div class="films-container">
  <div class="header">
    <div class="title-section">
      <h1>Films</h1>
    </div>

    <!-- Filtres -->
    <div class="filters-section">
      <div class="filter-row">
        <!-- Filtre par titre -->
        <div class="filter-item">
          <label for="titleFilter">Titre:</label>
          <input
            id="titleFilter"
            type="text"
            placeholder="Rechercher par titre..."
            [(ngModel)]="titleFilter"
            (ngModelChange)="onTitleFilterChange()"
            class="filter-input"
          />
        </div>

        <!-- Filtre par année -->
        <div class="filter-item">
          <label for="yearFilter">Année:</label>
          <select
            id="yearFilter"
            [(ngModel)]="selectedYear"
            (ngModelChange)="onYearFilterChange()"
            class="filter-select"
          >
            <option value="">Tous les ans</option>
            <option *ngFor="let year of availableYears" [value]="year.toString()">
              {{ year }}
            </option>
          </select>
        </div>

        <!-- Bouton Clear Filters -->
        <button class="filter-btn-clear" (click)="clearFilters()"
                [disabled]="!titleFilter && !selectedYear && selectedGenres.size === 0">
          Réinitialiser
        </button>
      </div>

      <!-- Filtre par genres -->
      <div class="filter-genres">
        <label>Genres:</label>
        <div class="genres-grid">
          <label *ngFor="let genre of allGenres" class="genre-checkbox">
            <input
              type="checkbox"
              [checked]="isGenreSelected(genre.name)"
              (change)="toggleGenre(genre.name)"
            />
            {{ genre.name }}
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="films-grid">
    <div *ngIf="paginatedFilms.length === 0" class="no-results">
      <p>Aucun film trouvé</p>
    </div>

    <div *ngFor="let film of paginatedFilms" class="film-card">
      <a [routerLink]="['/films', film.id]" class="film-link">
        <div class="film-poster">
          <img [src]="film.poster" [alt]="film.title" />
        </div>
        <div class="film-info">
          <h3>{{ film.title }}</h3>
          <p class="year">{{ film.releaseDate }}</p>
          <p class="genre">{{ film.genre }}</p>
          <div class="rating">
            <span class="stars">★ {{ film.rating }}</span>
          </div>
        </div>
      </a>
    </div>
  </div>

  <!-- Pagination Controls -->
  <div *ngIf="totalPages > 1" class="pagination-controls">
    <div class="pagination-buttons">
      <button
        class="pagination-btn first-btn"
        (click)="goToFirstPage()"
        [disabled]="currentPage === 1"
        title="Première page"
      >
        « Début
      </button>

      <button
        class="pagination-btn"
        (click)="previousPage()"
        [disabled]="currentPage === 1"
      >
        ← Précédent
      </button>

      <!-- Pages à afficher -->
      <div class="page-numbers">
        <button
          *ngFor="let page of pagesToDisplay"
          class="page-number"
          [class.active]="page === currentPage"
          (click)="goToPage(page)"
        >
          {{ page }}
        </button>
      </div>

      <button
        class="pagination-btn"
        (click)="nextPage()"
        [disabled]="currentPage === totalPages"
      >
        Suivant →
      </button>

      <button
        class="pagination-btn last-btn"
        (click)="goToLastPage()"
        [disabled]="currentPage === totalPages"
        title="Dernière page"
      >
        Fin »
      </button>
    </div>

    <span class="pagination-info">
      Page {{ currentPage }} / {{ totalPages }} ({{ totalElements }} films)
    </span>
  </div>
</div>
